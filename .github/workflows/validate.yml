name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate package
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\scripts\Test-Package.ps1
