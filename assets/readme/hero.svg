<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Codex 2007 — Windows Codex 的 QQ2007 怀旧视觉层</title>
  <desc id="desc">深蓝标题栏与冰蓝工作区组成的项目首图，展示左侧任务栏、中央原生对话区和右侧好友形象栏。</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fcff"/>
      <stop offset="1" stop-color="#d8ecfa"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b62b5"/>
      <stop offset="0.55" stop-color="#2380d8"/>
      <stop offset="1" stop-color="#1768b4"/>
    </linearGradient>
    <linearGradient id="toolbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fdff"/>
      <stop offset="1" stop-color="#cbe3f5"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#083c79" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="24" fill="url(#page)"/>
  <path d="M0 24A24 24 0 0 1 24 0h1152a24 24 0 0 1 24 24v46H0Z" fill="url(#titlebar)"/>
  <circle cx="34" cy="35" r="13" fill="#fff" opacity="0.98"/>
  <path d="M28 40c4-12 8-12 12 0M30 31h8" fill="none" stroke="#1768b4" stroke-width="3" stroke-linecap="round"/>
  <text x="60" y="45" fill="#fff" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="25" font-weight="700">Codex 2007</text>
  <text x="1025" y="43" fill="#dff1ff" font-family="Segoe UI, sans-serif" font-size="20">LOCAL · REVERSIBLE</text>

  <g transform="translate(54 112)">
    <text x="0" y="0" fill="#1768b4" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="20" font-weight="700" letter-spacing="2">WINDOWS CODEX VISUAL LAYER</text>
    <text x="0" y="67" fill="#092052" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="58" font-weight="800">把 Codex 装进</text>
    <text x="0" y="128" fill="#0b62b5" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="58" font-weight="800">QQ2007 的蓝色窗口</text>
    <text x="2" y="177" fill="#285578" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="24">保留原生交互 · 本机注入 · 独立验收 · 一键恢复</text>

    <g transform="translate(0 216)" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="19" font-weight="700">
      <rect width="138" height="39" rx="8" fill="#fff" stroke="#78aeda"/>
      <text x="69" y="26" text-anchor="middle" fill="#174d79">WINDOWS 10/11</text>
      <rect x="150" width="116" height="39" rx="8" fill="#fff" stroke="#78aeda"/>
      <text x="208" y="26" text-anchor="middle" fill="#174d79">NODE 22+</text>
      <rect x="278" width="128" height="39" rx="8" fill="#e5f6df" stroke="#84b267"/>
      <text x="342" y="26" text-anchor="middle" fill="#3a6c25">NO TELEMETRY</text>
    </g>
  </g>

