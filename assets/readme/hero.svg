    <rect x="23" y="94" width="90" height="25" rx="6" fill="#c4e2f7" stroke="#6aa6d4"/>
    <rect x="23" y="132" width="76" height="8" rx="4" fill="#a4c9e5"/>
    <rect x="23" y="152" width="84" height="8" rx="4" fill="#c6ddec"/>
    <rect x="23" y="172" width="64" height="8" rx="4" fill="#c6ddec"/>

    <rect x="136" y="52" width="218" height="202" fill="#fff" stroke="#aecbe1"/>
    <rect x="152" y="72" width="151" height="12" rx="6" fill="#d7e5ef"/>
    <rect x="181" y="99" width="154" height="38" rx="13" fill="#eef1f4"/>
    <rect x="152" y="153" width="168" height="9" rx="4" fill="#d7e5ef"/>
    <rect x="152" y="172" width="138" height="9" rx="4" fill="#d7e5ef"/>
    <rect x="148" y="207" width="194" height="34" rx="6" fill="#fbfdff" stroke="#78aeda"/>
    <text x="161" y="230" fill="#778998" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18">随心输入</text>

    <rect x="366" y="52" width="92" height="202" rx="7" fill="#eef7fd" stroke="#8db9da"/>
    <text x="378" y="80" fill="#11284a" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="700">好友</text>
    <circle cx="412" cy="118" r="28" fill="#4e8bea" stroke="#174d79" stroke-width="3"/>
    <rect x="392" y="109" width="40" height="21" rx="7" fill="#11284a"/>
    <path d="m400 115 8 6-8 6m18 0h7" fill="none" stroke="#9df6ff" stroke-width="3" stroke-linecap="round"/>
    <text x="377" y="161" fill="#11284a" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="18" font-weight="700">Codex 小蓝</text>
    <rect x="377" y="181" width="70" height="8" rx="4" fill="#a4c9e5"/>
    <rect x="377" y="200" width="60" height="8" rx="4" fill="#c6ddec"/>
